<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>PlayGood || Premium Music Experience</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  
  <style>
    body {
      font-family: "Plus Jakarta Sans", sans-serif;
      background: radial-gradient(circle at top left, #1e1e1e, #121212);
      color: white;
      overflow-x: hidden;
    }

    .glass {
      background: rgba(24, 24, 24, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .music-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
      background: #181818;
    }
    .music-card.is-playing {
      border-color: #1db954;
      background: #2a2a2a;
    }
    .music-card:hover {
      background: #2a2a2a;
      transform: translateY(-5px);
    }

    .marquee-container {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      position: relative;
    }
    .marquee-text {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 12s linear infinite;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .progress-container {
      width: 100%;
      height: 5px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #1db954;
      width: 0%;
      transition: width 0.1s linear;
    }

    .spinner {
      border: 3px solid rgba(29, 185, 84, 0.1);
      border-left-color: #1db954;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes eq-pulse {
      0%, 100% { height: 10%; }
      50% { height: 100%; }
    }
    .eq-bar {
      animation: eq-pulse 1s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="sticky top-0 z-40 glass border-b border-white/5 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center">
      <h1 class="text-xl font-extrabold tracking-tight select-none">
        Play<span class="text-[#1db954]">Good</span>
      </h1>
    </div>
  </header>

  <main class="flex-grow px-6 py-8 max-w-7xl mx-auto w-full">
    <div class="max-w-2xl mx-auto mb-10">
      <div class="relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <i class="fas fa-search text-gray-500 group-focus-within:text-[#1db954] transition-colors"></i>
        </div>
        <input id="searchInput" type="search" 
          class="block w-full bg-[#1e1e1e] border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#1db954]/50 transition-all"
          placeholder="Cari lagu favoritmu..."/>
      </div>
    </div>

    <div class="mb-6">
      <h2 class="text-xl font-bold flex items-center gap-2 uppercase tracking-wider">
        <i class="fas fa-bolt text-[#1db954]"></i> Recomend Music
      </h2>
    </div>

    <section id="playlist" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 min-h-[400px]">
    </section>
  </main>

  <div id="playerModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-black/90 backdrop-blur-md"></div>
    <div class="bg-[#181818] border border-white/10 rounded-3xl max-w-md w-full p-8 relative shadow-2xl overflow-hidden">
      
      <button id="closePlayer" class="absolute top-6 right-6 text-gray-500 hover:text-white transition-colors z-10">
        <i class="fas fa-xmark text-2xl"></i>
      </button>

      <div id="playerContent" class="flex flex-col items-center">
        <div class="relative mb-8 mt-4">
          <img id="playerCover" src="" class="w-64 h-64 rounded-2xl object-cover shadow-2xl border border-white/5"/>
        </div>

        <div class="text-center w-full mb-8 overflow-hidden">
          <div class="marquee-container">
             <h2 id="playerTitle" class="marquee-text text-2xl font-bold">Memuat lagu...</h2>
          </div>
          <p id="playerArtist" class="text-[#1db954] font-medium mt-1">Nama Artis</p>
        </div>

        <div class="w-full space-y-6">
          <div class="px-2">
            <div class="progress-container">
              <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
            <div class="flex justify-between text-[10px] text-gray-500 mt-2 font-bold tracking-widest">
              <span id="currentTime">0:00</span>
              <span id="durationTime">0:00</span>
            </div>
          </div>

          <div class="flex items-center justify-center space-x-12 px-4">
            <button id="prevBtn" class="text-2xl hover:text-[#1db954] transition"><i class="fas fa-backward-step"></i></button>
            <button id="playPauseBtn" class="bg-white text-black w-16 h-16 rounded-full flex items-center justify-center text-xl hover:scale-105 transition active:scale-95 shadow-xl">
              <i class="fas fa-play"></i>
            </button>
            <button id="nextBtn" class="text-2xl hover:text-[#1db954] transition"><i class="fas fa-forward-step"></i></button>
          </div>
        </div>
      </div>

      <div id="playerLoading" class="absolute inset-0 bg-[#181818] flex flex-col items-center justify-center z-20 hidden">
        <div class="spinner mb-4"></div>
        <p class="text-gray-400 text-sm font-medium tracking-widest">SEDANG MEMUAT...</p>
      </div>
    </div>
  </div>

  <div id="miniPlayer" class="fixed bottom-6 left-6 right-6 glass border border-white/10 rounded-2xl p-3 flex items-center space-x-4 shadow-2xl z-40 transform transition-transform duration-500 translate-y-[150%] hidden cursor-pointer">
    <img id="miniCover" src="" class="w-12 h-12 rounded-lg object-cover"/>
    <div class="flex-1 min-w-0">
      <h4 id="miniTitle" class="text-sm font-bold truncate">Judul Lagu</h4>
      <div class="w-full bg-white/10 h-1 rounded-full mt-2 overflow-hidden">
        <div id="miniProgressFill" class="bg-[#1db954] h-full transition-all duration-300" style="width: 0%"></div>
      </div>
    </div>
    <div class="flex items-center space-x-2">
      <button id="miniPlayPauseBtn" class="w-10 h-10 flex items-center justify-center text-[#1db954] text-xl">
        <i class="fas fa-play"></i>
      </button>
      <button id="miniCloseBtn" class="text-gray-400 hover:text-white px-2">
        <i class="fas fa-xmark"></i>
      </button>
    </div>
  </div>

  <audio id="audioPlayer" preload="metadata"></audio>

  <script>
    const playlistContainer = document.getElementById("playlist");
    const searchInput = document.getElementById("searchInput");
    const playerModal = document.getElementById("playerModal");
    const closePlayerBtn = document.getElementById("closePlayer");
    const playerCover = document.getElementById("playerCover");
    const playerTitle = document.getElementById("playerTitle");
    const playerArtist = document.getElementById("playerArtist");
    const progressBarFill = document.getElementById("progressBarFill");
    const currentTimeEl = document.getElementById("currentTime");
    const durationTimeEl = document.getElementById("durationTime");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const audioPlayer = document.getElementById("audioPlayer");
    const playerLoading = document.getElementById("playerLoading");
    const miniPlayer = document.getElementById("miniPlayer");
    const miniProgressFill = document.getElementById("miniProgressFill");

    let playlistData = [];
    let currentIndex = -1;
    let isPlaying = false;
    let activeTrackUrl = "";

    const equalizerHTML = `
      <div class="flex space-x-1 justify-center items-end h-8">
        <div class="w-1.5 h-4 bg-lime-500 eq-bar" style="animation-delay: -0.4s"></div>
        <div class="w-1.5 h-6 bg-lime-500 eq-bar" style="animation-delay: -0.2s"></div>
        <div class="w-1.5 h-8 bg-lime-500 eq-bar"></div>
        <div class="w-1.5 h-6 bg-lime-500 eq-bar" style="animation-delay: -0.2s"></div>
        <div class="w-1.5 h-4 bg-lime-500 eq-bar" style="animation-delay: -0.4s"></div>
      </div>
    `;

    // --- SKELETON ---
    function showSkeleton() {
      const skeletonHTML = `<div class="animate-pulse bg-[#181818] p-4 rounded-2xl border border-white/5 shadow-xl">
        <div class="bg-white/5 rounded-xl aspect-square mb-4"></div>
        <div class="h-4 bg-white/5 rounded w-3/4 mb-2"></div>
        <div class="h-3 bg-white/5 rounded w-1/2"></div>
      </div>`;
      playlistContainer.innerHTML = skeletonHTML.repeat(12);
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
    }

    // --- SAVE & RESTORE LOGIC ---
    function saveLastPlayed(track) {
      localStorage.setItem("lastPlayedTrack", JSON.stringify(track));
    }

    function restoreLastPlayed() {
      const saved = localStorage.getItem("lastPlayedTrack");
      if (saved) {
        const track = JSON.parse(saved);
        activeTrackUrl = track.track_url;
        
        // Update Mini Player UI
        document.getElementById("miniTitle").textContent = track.title;
        document.getElementById("miniCover").src = track.thumbnail;
        
        // Update Modal Player UI (Persiapan jika dibuka)
        playerTitle.textContent = track.title;
        playerArtist.textContent = track.artist;
        playerCover.src = track.thumbnail;

        // Tampilkan Mini Player
        miniPlayer.classList.remove("hidden");
        setTimeout(() => miniPlayer.style.transform = "translateY(0)", 100);
      }
    }

    function renderPlaylist(items) {
      playlistData = items;
      playlistContainer.innerHTML = "";
      items.forEach((track, index) => {
        const card = document.createElement("div");
        const isCurrent = track.track_url === activeTrackUrl;
        card.className = `music-card p-4 rounded-2xl cursor-pointer group shadow-xl ${isCurrent ? 'is-playing' : ''}`;
        
        card.innerHTML = `
          <div class="relative overflow-hidden rounded-xl mb-4 aspect-square">
            <img src="${track.thumbnail}" class="object-cover w-full h-full" loading="lazy">
            <div class="absolute inset-0 bg-black/40 ${isCurrent ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity flex items-center justify-center">
              ${isCurrent && isPlaying ? equalizerHTML : '<div class="bg-[#1db954] w-12 h-12 rounded-full flex items-center justify-center text-black shadow-2xl"><i class="fas fa-play"></i></div>'}
            </div>
          </div>
          <div class="marquee-container mb-1">
             <h3 class="marquee-text font-bold text-sm">${track.title}</h3>
          </div>
          <p class="text-gray-500 text-[11px] truncate">${track.artist}</p>`;
        
        card.onclick = () => {
          if (track.track_url === activeTrackUrl) {
            if (!audioPlayer.src) { // Jika baru di-restore tapi belum di-load audionya
                openPlayer(index);
            } else {
                playerModal.classList.remove("hidden");
            }
          } else {
            openPlayer(index);
          }
        };
        playlistContainer.appendChild(card);
      });
    }

    async function fetchSongs(query) {
      try {
        showSkeleton();
        const res = await fetch(`https://apikuu-black.vercel.app/api/search/spotify?q=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.success) renderPlaylist(data.data);
      } catch (err) { console.error(err); }
    }

    async function openPlayer(index) {
      if (!playlistData[index]) return;
      currentIndex = index;
      activeTrackUrl = playlistData[index].track_url;
      
      // Simpan lagu ke LocalStorage
      saveLastPlayed(playlistData[index]);
      
      playerModal.classList.remove("hidden");
      playerLoading.classList.remove("hidden");
      
      try {
        const res = await fetch(`https://apikuu-black.vercel.app/api/download/spotify?url=${encodeURIComponent(activeTrackUrl)}`);
        const json = await res.json();

        if (json.status && json.download) {
          audioPlayer.src = json.download;
          playerTitle.textContent = playlistData[index].title;
          playerArtist.textContent = playlistData[index].artist;
          playerCover.src = playlistData[index].thumbnail;
          
          audioPlayer.onloadedmetadata = () => {
            durationTimeEl.textContent = formatTime(audioPlayer.duration);
            progressBarFill.style.width = "0%";
            playerLoading.classList.add("hidden");
            playAudio();
          };

          document.getElementById("miniTitle").textContent = playlistData[index].title;
          document.getElementById("miniCover").src = playlistData[index].thumbnail;
          miniPlayer.classList.remove("hidden");
          setTimeout(() => miniPlayer.style.transform = "translateY(0)", 100);
        }
      } catch (error) { playerLoading.classList.add("hidden"); }
    }

    function playAudio() {
      if (!audioPlayer.src && activeTrackUrl) {
        // Jika miniplayer ada (restore) tapi belum di-play sama sekali
        const saved = JSON.parse(localStorage.getItem("lastPlayedTrack"));
        const idx = playlistData.findIndex(t => t.track_url === activeTrackUrl);
        if (idx !== -1) { openPlayer(idx); } 
        else { 
            // Kalau lagu ga ada di playlist saat ini, kita fetch ulang downloadnya
            fetchDownloadForRestore();
        }
        return;
      }
      audioPlayer.play();
      isPlaying = true;
      updateUI();
    }

    async function fetchDownloadForRestore() {
        const saved = JSON.parse(localStorage.getItem("lastPlayedTrack"));
        playerLoading.classList.remove("hidden");
        playerModal.classList.remove("hidden");
        const res = await fetch(`https://apikuu-black.vercel.app/api/download/spotify?url=${encodeURIComponent(saved.track_url)}`);
        const json = await res.json();
        if (json.download) {
            audioPlayer.src = json.download;
            audioPlayer.onloadedmetadata = () => {
                playerLoading.classList.add("hidden");
                playAudio();
            };
        }
    }

    function pauseAudio() {
      audioPlayer.pause();
      isPlaying = false;
      updateUI();
    }

    function updateUI() {
      const icon = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
      playPauseBtn.innerHTML = icon;
      document.getElementById("miniPlayPauseBtn").innerHTML = icon;
      renderPlaylist(playlistData);
    }

    playPauseBtn.onclick = () => isPlaying ? pauseAudio() : playAudio();
    document.getElementById("miniPlayPauseBtn").onclick = (e) => {
      e.stopPropagation();
      isPlaying ? pauseAudio() : playAudio();
    };

    miniPlayer.onclick = () => {
      if (!audioPlayer.src) {
          fetchDownloadForRestore();
      } else {
          playerModal.classList.remove("hidden");
      }
    };

    audioPlayer.ontimeupdate = () => {
      const current = audioPlayer.currentTime;
      const duration = audioPlayer.duration;
      if (duration > 0) {
        const percent = (current / duration) * 100;
        progressBarFill.style.width = percent + "%";
        miniProgressFill.style.width = percent + "%";
        currentTimeEl.textContent = formatTime(current);
      }
    };

    audioPlayer.onended = () => {
      audioPlayer.currentTime = 0;
      playAudio();
    };

    closePlayerBtn.onclick = () => playerModal.classList.add("hidden");
    
    document.getElementById("miniCloseBtn").onclick = (e) => {
      e.stopPropagation();
      pauseAudio();
      activeTrackUrl = "";
      localStorage.removeItem("lastPlayedTrack"); // Hapus memori saat klik silang
      miniPlayer.style.transform = "translateY(150%)";
      setTimeout(() => miniPlayer.classList.add("hidden"), 500);
      renderPlaylist(playlistData);
    };

    document.getElementById("prevBtn").onclick = () => currentIndex > 0 && openPlayer(currentIndex - 1);
    document.getElementById("nextBtn").onclick = () => currentIndex < playlistData.length - 1 && openPlayer(currentIndex + 1);

    // RESTORE LAGU TERAKHIR SAAT BUKA BROWSER
    window.addEventListener("DOMContentLoaded", () => {
      restoreLastPlayed();
      fetchSongs("Top Hits Indonesia 2026");
    });

    let timer;
    searchInput.oninput = (e) => {
      clearTimeout(timer);
      timer = setTimeout(() => {
        if(e.target.value.trim().length > 0) fetchSongs(e.target.value);
      }, 700);
    };
  </script>
</body>
</html>
